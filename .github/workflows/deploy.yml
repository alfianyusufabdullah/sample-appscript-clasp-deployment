name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: npm run build

      - name: Authenticate Clasp
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          echo "$CLASP_JSON" > .clasp.json
          echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Debug Clasp Config
        run: |
          echo "=== .clasp.json keys ==="
          node -e "const o = JSON.parse(require('fs').readFileSync('.clasp.json','utf8')); console.log(Object.keys(o))"
          echo "=== ~/.clasprc.json keys ==="
          node -e "const o = JSON.parse(require('fs').readFileSync(require('os').homedir()+'/.clasprc.json','utf8')); console.log(Object.keys(o))"
          echo "=== Clasp Paths ==="
          npx @google/clasp paths

      - name: Deploy with Clasp
        run: npx @google/clasp push
