name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: npm run build

      - name: Deploy with Clasp
        uses: anthonykrivonos/clasp-action@v1.0
        with:
          clasp_json: ${{ secrets.CLASP_JSON }}
          clasprc_json: ${{ secrets.CLASPRC_JSON }}
          deployment_command: push
